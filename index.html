<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normanhurst Nitro - Build Season To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="login-container" class="auth-box">
        <h1>Normanhurst Nitro</h1>
        <h2 id="auth-title">Build Season To-Do List</h2>
        
        <div class="auth-form">
            <input type="email" id="email-input" placeholder="Email Address">
            <input type="password" id="password-input" placeholder="Password">
            
            <button id="email-auth-btn" class="btn primary-btn">Sign In with Email</button>
            <button id="google-login-btn" class="btn google-btn">Sign In with Google</button>
            
            <hr>
            <p id="toggle-auth-text" class="forgot-text">Don't have an account? <a href="#" id="toggle-auth-link">Create one here</a></p>
            <p id="forgot-password-wrapper" class="forgot-text">Forgot your password? <a href="#" id="forgot-password-btn">Reset it</a></p>
            <p id="auth-message" class="message-text"></p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header class="top-bar">
            <div class="header-title">
                <input type="text" id="robot-name-input" placeholder="insert robot name here">
                <span>to do list</span>
            </div>
            <button id="logout-btn" class="btn danger-btn">Log Out</button>
        </header>

        <main class="categories-grid">
            <div id="sections-wrapper"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
