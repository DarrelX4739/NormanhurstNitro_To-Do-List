<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normanhurst Nitro - Workspace</title>
    
    <link rel="icon" type="image/png" href="https://th.bing.com/th/id/ODF.hUDxrTj1sIOtZ56NkQsNYg?w=32&h=32&qlt=90&pcl=fffffa&o=6&pid=1.2">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="login-container" class="auth-box">
        <h1>Normanhurst Nitro</h1>
        <h2 id="auth-title">Team Workspace</h2>
        
        <div class="auth-form">
            <input type="email" id="email-input" placeholder="Email Address" autocomplete="off">
            <input type="password" id="password-input" placeholder="Password">
            
            <button id="email-auth-btn" class="btn primary-btn">Sign In with Email</button>
            <button id="google-login-btn" class="btn google-btn">Sign In with Google</button>
            
            <hr>
            <p id="toggle-auth-text" class="forgot-text">Don't have an account? <a href="#" id="toggle-auth-link">Create one here</a></p>
            <p id="forgot-password-wrapper" class="forgot-text">Forgot your password? <a href="#" id="forgot-password-btn">Reset it</a></p>
            <p id="auth-message" class="message-text"></p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header class="top-bar">
            <div class="header-title">
                <div class="input-wrap" id="robot-wrap" data-value="">
                    <input type="text" id="robot-name-input" placeholder="insert robot name here" autocomplete="off">
                </div>
                <span class="header-static-text">Workspace</span>
            </div>
            
            <nav class="nav-tabs">
                <button id="tab-todo-btn" class="tab-btn active" onclick="switchWidget('todo')">To-Do List</button>
                <button id="tab-chat-btn" class="tab-btn" onclick="switchWidget('chat')">
                    Chat <span id="chat-badge" class="notification-badge hidden"></span>
                </button>
            </nav>

            <button id="logout-btn" class="btn danger-btn">Log Out</button>
        </header>

        <div id="announcement-container" class="announcement-container"></div>

        <main class="app-viewport">
            <div id="widget-todo" class="widget-content">
                <div id="sections-wrapper" class="categories-grid"></div>
            </div>

            <div id="widget-chat" class="widget-content hidden">
                <div class="chat-window">
                    <div class="chat-header">
                        <h3>Team Feed</h3>
                        <button id="pins-toggle-btn" class="btn secondary-btn" onclick="togglePinsView()">📌 Pins</button>
                    </div>

                    <div id="pinned-messages-drawer" class="pinned-drawer hidden">
                        <h4>Pinned Messages</h4>
                        <div id="pinned-list"></div>
                    </div>

                    <div id="chat-messages" class="chat-messages-box"></div>

                    <div id="reply-preview-bar" class="reply-preview hidden">
                        <span id="reply-preview-text">Replying to...</span>
                        <button onclick="cancelReplyState()" class="cancel-reply-btn">×</button>
                    </div>

                    <div class="chat-input-row">
                        <input type="text" id="chat-input" placeholder="Message the team... (Use /announce for global banners)" autocomplete="off">
                        <button id="chat-send-btn" class="btn primary-btn">Send</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="custom-context-menu" class="context-menu hidden">
        <div class="emoji-reaction-row">
            <span class="menu-emoji-btn" onclick="handleMenuReaction('❤️')">❤️</span>
            <span class="menu-emoji-btn" onclick="handleMenuReaction('😊')">😊</span>
            <span class="menu-emoji-btn" onclick="handleMenuReaction('🔥')">🔥</span>
            <span class="menu-emoji-btn" onclick="handleMenuReaction('💀')">💀</span>
            <span class="menu-emoji-btn" onclick="handleMenuReaction('😭')">😭</span>
        </div>
        <hr class="menu-divider">
        <button id="menu-reply-btn">💬 Reply Inline</button>
        <button id="menu-pin-btn">📌 Pin/Unpin Message</button>
        <button id="menu-delete-btn" class="danger-item">🗑️ Delete Message</button>
    </div>

    <script src="app.js"></script>
    <div id="widget-resources" class="widget-container">
  <div class="widget-header">
    <h2>📁 Team Resources & Models</h2>
    <p>Share useful links, reference images, and CAD (.stl) files.</p>
  </div>

  <div class="resource-form-card">
    <h3>Add New Resource</h3>
    <div class="form-group">
      <input type="text" id="res-title" placeholder="Resource Title (e.g., Robot Arm STL, WPILib Docs)" required>
    </div>
    
    <div class="form-group">
      <label for="res-type">Resource Type:</label>
      <select id="res-type" onchange="toggleResourceType()">
        <option value="link">🌐 Web Link / URL</option>
        <option value="file">📎 File Upload (.stl, .png, .jpg)</option>
      </select>
    </div>

    <div id="url-input-group" class="form-group">
      <input type="url" id="res-url" placeholder="https://...">
    </div>

    <div id="file-input-group" class="form-group" style="display: none;">
      <input type="file" id="res-file" accept=".stl,.png,.jpg,.jpeg,.webp">
      <small id="upload-status" class="status-text"></small>
    </div>

    <button type="button" class="btn-primary" onclick="submitResource()">Add Resource</button>
  </div>

  <div class="resources-grid-section">
    <h3>Saved Resources</h3>
    <div id="resources-list" class="resources-grid">
      </div>
  </div>
</div>
</body>
</html>
